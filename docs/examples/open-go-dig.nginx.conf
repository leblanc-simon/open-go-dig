upstream open-go-dig {
    server 127.0.0.1:8080;
}

server {
    listen 80;
    server_name dig.example.com;

    # Redirection HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name dig.example.com;

    ssl_certificate     /etc/ssl/certs/dig.example.com.pem;
    ssl_certificate_key /etc/ssl/private/dig.example.com.key;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    access_log /var/log/nginx/open-go-dig.access.log;
    error_log  /var/log/nginx/open-go-dig.error.log;

    location / {
        proxy_pass         http://open-go-dig;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    10s;
    }
}
